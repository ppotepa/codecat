name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Codecat.slnx

      - name: Build
        run: dotnet build src/Codecat.Cli/Codecat.Cli.csproj --configuration Release --no-restore

      - name: Publish Native AOT
        run: dotnet publish src/Codecat.Cli/Codecat.Cli.csproj --configuration Release --runtime win-x64 --no-restore
