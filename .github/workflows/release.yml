name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, with or without the v prefix."
        required: true

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "${{ github.ref_name }}"
          }

          $version = $version.Trim()
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Release version could not be determined."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Build release artifacts
        shell: pwsh
        run: .\scripts\build-release.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          fail_on_unmatched_files: true
          files: |
            artifacts/release/codecat-${{ steps.version.outputs.version }}-win-x64.zip
            artifacts/release/codecat-${{ steps.version.outputs.version }}-win-x64.msi
